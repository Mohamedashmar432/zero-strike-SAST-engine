id: ZS-PY-006
name: Hardcoded Password or Secret Literal
version: "1.0.0"
language: python
category: secrets
severity: high
confidence: medium
cwe:
  - CWE-798
owasp:
  - "A07:2021"
description: |
  Detects string literals assigned to variables with names suggesting credentials.
  Matches variable names containing 'password', 'passwd', 'secret', or 'api_key'.
message: "Hardcoded credential detected — load secrets from environment variables or a vault"
references:
  - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
tags: [secrets, credentials, hardcoded]
match:
  kind: assignment
fix_suggestion: "Load secrets from os.environ or a secrets manager; never hardcode credentials."
