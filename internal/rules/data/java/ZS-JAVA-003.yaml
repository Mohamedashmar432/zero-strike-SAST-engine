id: ZS-JAVA-003
lifecycle: released
name: DocumentBuilderFactory XXE
version: "1.0.0"
language: java
category: xxe
severity: high
confidence: medium
cwe:
  - CWE-611
owasp:
  - "A05:2025"
rationale: |
  With external entity processing enabled by default, an attacker who
  controls XML parsed by DocumentBuilderFactory can declare a DOCTYPE with an
  external entity that reads local files (e.g. /etc/passwd or application
  config containing secrets) into the parsed document, makes the server issue
  outbound requests to attacker-chosen URLs (SSRF), or references an entity
  that expands recursively to exhaust memory (a "billion laughs" denial of
  service) — all without needing any other vulnerability, since the payload
  travels entirely inside the XML input.
description: |
  DocumentBuilderFactory.newInstance() is vulnerable to XML External Entity
  (XXE) injection by default: external entity and DOCTYPE processing are
  enabled unless explicitly disabled via setFeature(). This rule flags the
  factory instantiation itself.

  Known limitation: the engine cannot yet see whether a later setFeature()
  call on the same factory disables external entities, so already-hardened
  code also triggers this finding — the same false-positive-over-false-
  negative tradeoff already accepted by ZS-CFG-002 (Express/helmet).
message: "DocumentBuilderFactory.newInstance() detected — disable external entity/DOCTYPE processing to prevent XXE"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
tags: [xxe, xml]
match:
  kind: call
  callee: DocumentBuilderFactory.newInstance
fix_suggestion: "Call setFeature(\"http://apache.org/xml/features/disallow-doctype-decl\", true) on the factory before parsing, or use a hardened XML parser configuration."
