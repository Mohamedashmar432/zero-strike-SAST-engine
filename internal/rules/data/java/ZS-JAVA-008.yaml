id: ZS-JAVA-008
name: Weak JWT/HMAC Signing Secret
version: "1.0.0"
language: java
category: cryptography
severity: high
confidence: medium
cwe:
  - CWE-326
  - CWE-798
owasp:
  - "A04:2025"
rationale: |
  A short HMAC/JWT signing secret is within reach of an offline brute-force
  or dictionary attack against captured tokens using commodity tools like
  hashcat, and once an attacker recovers it they can forge arbitrary
  validly-signed tokens — impersonating any user, including administrators,
  and bypassing authentication and authorization entirely rather than just
  reading one piece of protected data. Because the secret is hardcoded, it
  also cannot be rotated without a code change and redeploy, so a single
  leak (a git history exposure, a decompiled JAR) leaves every token the
  application has ever issued or will issue forgeable until that redeploy
  happens.
description: |
  A variable named like a JWT or HMAC signing key/secret (jwtSecret,
  hmacKey, signingKey, etc.) is assigned a short string literal directly in
  source code. This is narrower than ZS-JAVA-005 (any hardcoded credential):
  it specifically targets signing-key material and flags only short literals
  (≤16 chars — at most 128 bits of keyspace even in the best case, and far
  less for a human-typed string), which are the ones realistically
  brute-forceable against HMAC.

  Known limitation: matching is name-based, not value-based, so a short
  literal assigned to a variable that merely LOOKS like a signing-key name
  (e.g. a config-key NAME such as jwtSecretEnvVarName = "JWT_SECRET") also
  triggers this rule. ZS-JAVA-005 has the same class of limitation with no
  length bound at all; this is an accepted precision/recall tradeoff for a
  name-pattern-based rule, not a regression introduced here.
message: "Short, hardcoded JWT/HMAC signing secret detected — use a long, randomly generated secret loaded from configuration or a secrets manager"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
tags: [weak-crypto, jwt, hardcoded-credential]
match:
  kind: assignment
  lhs_identifier: "(?i)(hmac.*key|jwt.*(secret|key)|signing.*key)"
  rhs_literal: "^\"[^\"]{1,16}\"$"
fix_suggestion: "Generate a long (≥256-bit) random secret at deploy time and load it from configuration or a secrets manager — never hardcode signing key material."
