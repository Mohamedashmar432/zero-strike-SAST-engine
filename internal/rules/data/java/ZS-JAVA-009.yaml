id: ZS-JAVA-009
lifecycle: released
name: StAX XMLInputFactory XXE
version: "1.0.0"
language: java
category: xxe
severity: high
confidence: medium
cwe:
  - CWE-611
owasp:
  - "A05:2025"
rationale: |
  With external entity and DTD processing enabled by default, an attacker
  who controls XML parsed via XMLInputFactory can declare an external entity
  that reads local files (e.g. application configuration containing
  secrets) into the parsed stream, makes the server issue outbound requests
  to attacker-chosen URLs (SSRF), or references an entity that expands
  recursively to exhaust memory (a "billion laughs" denial of service) — the
  same class of impact as ZS-JAVA-003's DOM-parser case, since both APIs
  share the same underlying entity-resolution behavior. This is exploitable
  anywhere streamed XML input — a SOAP request body, an uploaded feed, a
  configuration import — comes from an untrusted source.
description: |
  XMLInputFactory (the StAX streaming XML API) is vulnerable to XML
  External Entity (XXE) injection by default, the same way
  DocumentBuilderFactory is (see ZS-JAVA-003) — external entity and DTD
  processing are enabled unless explicitly disabled via setProperty(). This
  is StAX's equivalent of ZS-JAVA-003's DOM-parser check; ship as a sibling
  rule rather than a multi-callee extension to ZS-JAVA-003, since the match
  schema is one callee per rule by design.

  Known limitation: same as ZS-JAVA-003 — the engine cannot yet see whether
  a later setProperty() call disables external entities/DTDs, so
  already-hardened code also triggers this finding.
message: "XMLInputFactory.newInstance() detected — disable external entity/DTD processing to prevent XXE"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
tags: [xxe, xml, stax]
match:
  kind: call
  callee: XMLInputFactory.newInstance
fix_suggestion: "Call setProperty(XMLInputFactory.SUPPORT_DTD, false) and setProperty(\"javax.xml.stream.isSupportingExternalEntities\", false) on the factory before parsing."
