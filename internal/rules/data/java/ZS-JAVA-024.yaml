id: ZS-JAVA-024
lifecycle: released
name: Tainted Format String (String.format)
version: "1.0.0"
language: java
category: format-string
severity: low
confidence: low
cwe:
  - CWE-134
owasp:
  - "A05:2025"
rationale: |
  When the format-string template itself is built from attacker-controlled
  input — e.g. String.format(userSuppliedTemplate, ...) rather than a fixed
  literal — the attacker can inject their own conversion specifiers (%s,
  %n, %x, deeply nested width/precision specifiers) to trigger unexpected
  output, resource-exhausting exceptions, or information disclosure of
  values never intended to be formatted with that call. This is a real,
  if less common, risk than injection into the values being formatted.

  Known limitation, documented deliberately rather than hidden: the
  engine's tainted_argument filter checks whether ANY argument to the call
  is tainted, with no way to require it be specifically the first
  (format-string) argument. As a result this rule ALSO fires on the
  extremely common, entirely safe placeholder idiom
  String.format("User: %s", username) — where only the interpolated value,
  not the template, is tainted — not just the real vulnerable shape where
  the template itself is attacker-controlled
  (String.format("User: " + username)). This rule is intentionally
  imprecise for that reason; every hit needs manual verification of which
  argument is actually tainted, mirroring how ZS-JAVA-012 and ZS-CS-013
  already document their own known over-breadth rather than silently
  narrowing (and thereby missing real hits) or pretending the rule is
  more precise than it is.
description: |
  String.format() is called with an argument that traces back to an
  untrusted source (intra-procedural taint tracking). This flags any
  tainted argument to the call, not specifically the format-string
  template — see the known-limitation note in the rationale above; most
  matches will be the safe "tainted value substituted into a fixed
  template" case and need manual review to confirm whether the template
  itself is attacker-controlled.
message: "String.format() called with a tainted argument — verify whether the format template itself (not just an interpolated value) is attacker-controlled"
references:
  - https://cwe.mitre.org/data/definitions/134.html
tags: [format-string, injection]
match:
  kind: call
  callee: String.format
  filters:
    - tainted_argument: true
fix_suggestion: "Never build the format-string template from untrusted input; use a fixed literal template and pass tainted data only as substitution arguments."
