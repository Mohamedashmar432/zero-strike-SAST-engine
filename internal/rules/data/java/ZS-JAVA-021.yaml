id: ZS-JAVA-021
lifecycle: released
name: Open Redirect (HttpServletResponse.sendRedirect)
version: "1.0.0"
language: java
category: open-redirect
severity: medium
confidence: medium
cwe:
  - CWE-601
owasp:
  - "A01:2025"
rationale: |
  Passing an attacker-controlled URL to response.sendRedirect() sends the
  victim's browser to whatever destination the attacker chose, while the
  link itself still points at the trusted application's domain — a pattern
  widely used in phishing to lend legitimacy to a malicious landing page, and
  in some OAuth/SSO flows to steal authorization codes or tokens by
  redirecting them to an attacker-controlled callback. This is exploitable
  wherever a query parameter or form field is passed to sendRedirect()
  without validating it against an allowlist of permitted destinations.
description: |
  Detects calls to response.sendRedirect() where the destination traces
  back to an untrusted source (intra-procedural taint tracking); "response"
  is the standard HttpServletResponse parameter/field name in the Servlet
  API.
message: "response.sendRedirect() called with a tainted destination — open redirect risk"
references:
  - https://cwe.mitre.org/data/definitions/601.html
tags: [open-redirect, injection, servlet]
match:
  kind: call
  callee: response.sendRedirect
  filters:
    - tainted_argument: true
fix_suggestion: "Validate the destination against an allowlist of known-safe paths/domains before passing it to sendRedirect()."
