id: ZS-JAVA-006
name: File Path Traversal
version: "1.0.0"
language: java
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
rationale: |
  When a tainted value reaches new File() unvalidated, an attacker can embed
  "../" sequences or an absolute path to escape the intended base directory,
  letting them read arbitrary files (configuration, credentials, other
  users' data) or, if the File is later written to, overwrite arbitrary
  files such as application configuration or a web-accessible directory to
  plant a webshell. This is exploitable wherever the path segment is
  attacker-influenced: an uploaded filename, a query parameter used to pick
  a resource, or any other request-derived value.
description: |
  A java.io.File is constructed with a path that traces back to an untrusted
  source (intra-procedural taint tracking), which can allow reading or
  writing files outside the intended directory.
message: "new File() called with a tainted path — validate and confine the path before use"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [path-traversal, file-access]
match:
  kind: call
  callee: File
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with File.getCanonicalPath() and confirm it stays within the allowed base directory before use, or reject paths containing '..'."
