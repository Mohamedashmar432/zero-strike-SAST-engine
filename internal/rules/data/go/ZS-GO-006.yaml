id: ZS-GO-006
lifecycle: released
name: os.ReadFile Path Traversal
version: "1.0.0"
language: go
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
rationale: |
  os.ReadFile() reads whatever path it is given relative to the process's
  working directory, so attacker-controlled path segments containing ../
  sequences (or an absolute path, depending on how the path is joined) let
  an attacker escape the intended directory and read arbitrary files the
  process's OS-level permissions allow — configuration files, other users'
  data, or source code. This is exploitable wherever a filename or path
  segment from a request (a download endpoint, template name, or
  user-uploaded file reference) is joined into the path passed to
  os.ReadFile() without first resolving and confining it to an allowed
  base directory.

  Sibling rule to ZS-GO-003 (os.Open): os.ReadFile is the Go 1.16+
  idiomatic one-call read (superseding ioutil.ReadFile), used at least as
  often as os.Open for simple "read this whole file" cases, so it gets its
  own rule rather than being folded into ZS-GO-003's exact-callee match.
description: |
  os.ReadFile() is called with a path that traces back to an untrusted
  source (intra-procedural taint tracking).
message: "os.ReadFile() called with a tainted path — validate and confine the path before use"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [path-traversal, file-access]
match:
  kind: call
  callee: os.ReadFile
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with filepath.Clean/filepath.Abs and confirm it stays within the allowed base directory before reading it."
