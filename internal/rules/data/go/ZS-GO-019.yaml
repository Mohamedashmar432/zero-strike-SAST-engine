id: ZS-GO-019
lifecycle: released
name: Open Redirect (http.Redirect)
version: "1.0.0"
language: go
category: open-redirect
severity: medium
confidence: medium
cwe:
  - CWE-601
owasp:
  - "A01:2025"
rationale: |
  http.Redirect(w, r, url, code) sending the user to an attacker-controlled
  URL enables phishing, since the redirect appears to originate from the
  trusted domain that issued it — a pattern widely used to lend legitimacy
  to a malicious landing page, and in some OAuth/SSO flows to steal
  authorization codes or tokens by redirecting them to an
  attacker-controlled callback. This is exploitable wherever a query
  parameter, form field, or header is passed as the redirect target
  without validating it against an allowlist of permitted destinations.
description: |
  Detects calls to http.Redirect() where the URL argument traces back to
  an untrusted source (intra-procedural taint tracking).
message: "http.Redirect() called with a tainted URL — validate the destination against an allowlist before redirecting"
references:
  - https://owasp.org/www-community/attacks/Unvalidated_Redirects_and_Forwards_Cheat_Sheet
  - https://cwe.mitre.org/data/definitions/601.html
tags: [open-redirect, injection, http]
match:
  kind: call
  callee: http.Redirect
  filters:
    - tainted_argument: true
fix_suggestion: "Validate the redirect destination against an allowlist of known-safe paths/domains before passing it to http.Redirect()."
