id: ZS-GO-001
lifecycle: released
name: exec.Command Command Injection
version: "1.0.0"
language: go
category: injection
severity: high
confidence: high
cwe:
  - CWE-78
owasp:
  - "A05:2025"
rationale: |
  exec.Command() forks and executes the named program directly via the OS,
  without an intervening shell, so a tainted value used only as an argument
  is passed to the target program's argv rather than reinterpreted for
  shell metacharacters (;, |, &&) the way Python's os.system() or PHP's
  system() would. The real exploitation path is when the attacker controls
  the program name itself — letting them execute an arbitrary binary — or
  when the tainted argument reaches a program that has its own dangerous
  flags or that is itself a shell (e.g. exec.Command("sh", "-c", tainted)),
  reintroducing full shell injection. This is exploitable wherever a
  filename, URL, or other request-derived value is built into the command
  or argument list for a shelled-out conversion, extraction, or admin
  utility.
description: |
  exec.Command() runs an external OS command, flagged when an argument
  traces back to an untrusted source (intra-procedural taint tracking).
message: "exec.Command() detected with a tainted argument — validate/allowlist the command and avoid passing user input to the shell"
references:
  - https://owasp.org/www-community/attacks/Command_Injection
tags: [command-injection, injection, exec]
match:
  kind: call
  callee: exec.Command
  filters:
    - tainted_argument: true
fix_suggestion: "Use a fixed executable path and pass user data only as validated, individually-quoted arguments, never as the command itself."
