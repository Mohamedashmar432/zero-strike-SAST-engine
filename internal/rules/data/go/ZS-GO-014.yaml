id: ZS-GO-014
lifecycle: released
name: tx.Query SQL Injection
version: "1.0.0"
language: go
category: injection
severity: high
confidence: medium
cwe:
  - CWE-89
owasp:
  - "A05:2025"
rationale: |
  Building a SQL query string by concatenating or Sprintf-ing
  attacker-controlled data before passing it to tx.Query() lets an attacker
  terminate the intended query and append arbitrary SQL — altering WHERE
  clauses to bypass authorization checks, using UNION SELECT to pull data
  from other tables, or chaining statements to modify or delete data. This
  is exploitable wherever a search term, identifier, or filter value from a
  request reaches the query string before Query()/QueryRow() runs it, and
  is fully avoidable by passing the value as a placeholder argument (?, $1)
  instead of splicing it into the SQL text.

  Sibling rule to ZS-GO-002 (db.Query): the transaction pattern (`tx, _ :=
  db.Begin()` followed by `tx.Query(...)`) uses a wholly separate variable
  name from `db`, not a longer-qualified path to it, so callee_suffix
  matching on ZS-GO-002 cannot bridge the two (see calleeSuffixMatches in
  internal/engine/engine.go — it extends a match to longer chains ending
  in the same exact suffix, not to unrelated receiver names sharing a
  method name). This needed its own rule, same known limitation as
  ZS-GO-002: matches the callee text "tx.Query" literally, so it only
  fires when the *sql.Tx variable is conventionally named "tx".
description: |
  A database query is executed on a transaction with a query string that
  traces back to an untrusted source (intra-procedural taint tracking),
  indicating SQL built by string concatenation/Sprintf instead of a
  parameterized placeholder.
message: "tx.Query() called with a tainted query string — use a parameterized query instead"
references:
  - https://owasp.org/www-community/attacks/SQL_Injection
tags: [sqli, injection, database-sql]
match:
  kind: call
  callee: tx.Query
  filters:
    - tainted_argument: true
fix_suggestion: "Use a parameterized query: tx.Query(\"SELECT * FROM users WHERE id = ?\", id) instead of building the query string with the tainted value."
