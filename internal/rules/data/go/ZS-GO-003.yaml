id: ZS-GO-003
name: os.Open Path Traversal
version: "1.0.0"
language: go
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
description: |
  os.Open() is called with a path that traces back to an untrusted source
  (intra-procedural taint tracking), which can allow reading files outside
  the intended directory.
message: "os.Open() called with a tainted path — validate and confine the path before use"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [path-traversal, file-access]
match:
  kind: call
  callee: os.Open
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with filepath.Clean/filepath.Abs and confirm it stays within the allowed base directory before opening it."
