id: ZS-PHP-008
lifecycle: released
name: require() Local File Inclusion
version: "1.0.0"
language: php
category: path-traversal
severity: high
confidence: high
cwe:
  - CWE-98
owasp:
  - "A01:2025"
rationale: |
  require() executes whatever file it is given as PHP source, identically
  to include() except it's a fatal error instead of a warning if the file
  is missing — the same file-inclusion risk applies: an attacker who
  controls the path can point it at an uploaded file, a poisoned log file,
  or a remote URL to execute arbitrary PHP. This is exploitable wherever a
  page/template name from $_GET/$_POST/$_REQUEST reaches require() without
  being checked against an allowlist of known-safe filenames.
description: |
  require is a language construct, not a function call — the PHP builder
  synthesizes a NodeKindCall for it (mirroring the existing echo_statement
  handling, same as ZS-PHP-007's include()) so this rule can use the same
  tainted_argument mechanism as every other sink rule. Flagged when the
  required path traces back to an untrusted source (intra-procedural taint
  tracking).
message: "require() called with a tainted path — local file inclusion risk"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [lfi, path-traversal, injection]
match:
  kind: call
  callee: require
  filters:
    - tainted_argument: true
fix_suggestion: "Never build a require path from user input; map an allowlisted set of keys to fixed filenames instead."
