id: ZS-PHP-017
lifecycle: released
name: Tainted Format String (sprintf)
version: "1.0.0"
language: php
category: format-string
severity: low
confidence: low
cwe:
  - CWE-134
owasp:
  - "A05:2025"
rationale: |
  When the format-string template itself is built from attacker-controlled
  input — e.g. sprintf($userSuppliedTemplate, ...) rather than a fixed
  literal — the attacker can inject their own conversion specifiers (%s,
  %d, %n$ positional specifiers, width/precision modifiers) to trigger
  unexpected output, warnings, or information disclosure of values never
  intended to be formatted with that call. This is a real, if less
  common, risk than injection into the values being formatted.

  Known limitation, documented deliberately rather than hidden: the
  engine's tainted_argument filter checks whether ANY argument to the
  call is tainted, with no way to require it be specifically the first
  (format-string) argument. As a result this rule ALSO fires on the
  extremely common, entirely safe case sprintf($fmt, $value) where $fmt is
  a fixed literal and only $value — the interpolated data — is tainted,
  not just the real vulnerable shape where the template itself is
  attacker-controlled (sprintf($fmt . $value)). This rule is intentionally
  imprecise for that reason; every hit needs manual verification of which
  argument is actually tainted, matching how the other format-string rules
  in this sprint (ZS-JAVA-024, ZS-CS-019) document the same tradeoff.
description: |
  sprintf() is called with an argument that traces back to an untrusted
  source (intra-procedural taint tracking). This flags any tainted
  argument to the call, not specifically the format-string template — see
  the known-limitation note in the rationale above; most matches will be
  the safe "tainted value substituted into a fixed template" case and
  need manual review to confirm whether the template itself is
  attacker-controlled.
message: "sprintf() called with a tainted argument — verify whether the format template itself (not just an interpolated value) is attacker-controlled"
references:
  - https://cwe.mitre.org/data/definitions/134.html
tags: [format-string, injection]
match:
  kind: call
  callee: sprintf
  filters:
    - tainted_argument: true
fix_suggestion: "Never build the format-string template from untrusted input; use a fixed literal template and pass tainted data only as substitution arguments."
