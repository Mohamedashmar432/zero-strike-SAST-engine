id: ZS-PHP-001
name: system() Command Injection
version: "1.0.0"
language: php
category: injection
severity: high
confidence: high
cwe:
  - CWE-78
owasp:
  - "A05:2025"
description: |
  system() executes an OS command, flagged when an argument traces back to
  an untrusted source (intra-procedural taint tracking).

  exec() and shell_exec() are functionally equivalent sinks; each is a
  distinct callee under this rule schema (one callee per rule), so a
  companion rule for them is a follow-up, not required for this sprint's
  exit criteria.
message: "system() detected with a tainted argument — validate/allowlist the command and avoid passing user input to the shell"
references:
  - https://owasp.org/www-community/attacks/Command_Injection
tags: [command-injection, injection]
match:
  kind: call
  callee: system
  filters:
    - tainted_argument: true
fix_suggestion: "Avoid shelling out with user input; if unavoidable, use escapeshellarg() on each argument and prefer a fixed, allowlisted command."
