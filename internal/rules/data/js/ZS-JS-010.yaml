id: ZS-JS-010
name: Empty catch Block Swallows Exception
version: "1.0.0"
language: javascript
category: error-handling
severity: medium
confidence: high
cwe:
  - CWE-390
owasp:
  - "A10:2025"
rationale: |
  Silently discarding an exception with no logging or handling means a
  failed security check — a broken signature verification, a failed
  authorization lookup, an exhausted validation — disappears without a
  trace, and execution simply continues as if it had succeeded (fail-open
  behavior). An attacker who can trigger the underlying error condition, for
  example by sending malformed input that throws during a validation or
  auth step, can rely on the empty handler to swallow the failure and let
  the request proceed as if it had passed.
description: |
  Detects a catch block with an empty body (no statements). Fires once per
  try block containing at least one such handler.
message: "Empty catch block detected — log or handle the exception instead of silently discarding it"
references:
  - https://cwe.mitre.org/data/definitions/390.html
tags: [exception-handling, empty-handler, fail-open]
match:
  kind: try
  filters:
    - has_empty_except_handler: true
fix_suggestion: "At minimum log the error (console.error(e)) instead of silently discarding it in the catch block."
