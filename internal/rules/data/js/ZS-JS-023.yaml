id: ZS-JS-023
lifecycle: released
name: Weak Pseudo-Random Number Generator (Math.random)
version: "1.0.0"
language: javascript
category: cryptography
severity: medium
confidence: medium
cwe:
  - CWE-338
owasp:
  - "A04:2025"
rationale: |
  Math.random() is not cryptographically secure: its output is generated by
  a fast, non-cryptographic algorithm with a small internal state that can
  be predicted or reconstructed by an attacker who observes a handful of
  outputs. Using it to generate session tokens, password-reset codes, API
  keys, or any other value that must be unguessable lets that attacker
  predict or brute-force future values far more easily than a true random
  space would allow. This is exploitable anywhere the generated value is
  meant to be unpredictable, unlike its legitimate uses (UI jitter,
  non-security sampling, test fixtures) where predictability doesn't
  matter.
description: |
  Detects zero-argument calls to Math.random().
message: "Math.random() detected — not cryptographically secure, predictable to an attacker"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
tags: [weak-crypto, weak-prng, math-random]
match:
  kind: call
  callee: Math.random
fix_suggestion: "Use crypto.randomBytes() or crypto.getRandomValues() for tokens, session IDs, and password-reset codes; Math.random() is fine only for non-security randomness."
