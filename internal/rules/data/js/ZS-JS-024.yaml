id: ZS-JS-024
lifecycle: released
name: Path Traversal via fs.readFile
version: "1.0.0"
language: javascript
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
rationale: |
  Reading a file whose path traces back to untrusted input lets an
  attacker embed ../ sequences (or supply an absolute path) to escape the
  intended directory and read arbitrary files the process's OS-level
  permissions allow — configuration files containing secrets, other
  users' data, or application source code. This is exploitable wherever a
  filename or path segment from a request (a download endpoint, template
  name, or user-uploaded file reference) reaches fs.readFile() without
  first being resolved and confined to an allowed base directory.
description: |
  Detects calls to fs.readFile() (the standard Node.js `const fs =
  require('fs')` convention) where the path argument traces back to an
  untrusted source (intra-procedural taint tracking).
message: "fs.readFile() called with a tainted path — validate and confine the path before use"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [path-traversal, file-access, node-fs]
match:
  kind: call
  callee: fs.readFile
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with path.resolve/path.normalize and confirm it stays within the allowed base directory before reading it."
