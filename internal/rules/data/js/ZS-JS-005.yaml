id: ZS-JS-005
name: outerHTML Assignment (DOM XSS)
version: "1.0.0"
language: javascript
category: xss
severity: high
confidence: medium
cwe:
  - CWE-79
owasp:
  - "A03:2021"
description: |
  Assigning to outerHTML replaces the element and all its children with raw HTML.
  If the value contains user-controlled data, this causes a Cross-Site Scripting
  (XSS) vulnerability.
message: "outerHTML assignment detected — sanitize input or use safe DOM APIs instead"
references:
  - https://owasp.org/www-community/attacks/xss/
tags: [xss, outerHTML, dom-injection]
match:
  kind: assignment
  lhs_identifier: "outerHTML"
fix_suggestion: "Use createElement/appendChild instead of outerHTML, or sanitize with DOMPurify before assignment."
