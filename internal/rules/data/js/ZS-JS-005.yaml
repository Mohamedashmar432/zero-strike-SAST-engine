id: ZS-JS-005
name: outerHTML Assignment (DOM XSS)
version: "1.0.0"
language: javascript
category: xss
severity: high
confidence: medium
cwe:
  - CWE-79
owasp:
  - "A05:2025"
description: |
  Assigning to outerHTML replaces the element and all its children with raw HTML,
  flagged when the assigned value traces back to an untrusted source
  (intra-procedural taint tracking).
message: "outerHTML assignment detected with a tainted value — sanitize input or use safe DOM APIs instead"
references:
  - https://owasp.org/www-community/attacks/xss/
tags: [xss, outerHTML, dom-injection]
match:
  kind: assignment
  lhs_identifier: "outerHTML"
  filters:
    - tainted_rhs: true
fix_suggestion: "Use createElement/appendChild instead of outerHTML, or sanitize with DOMPurify before assignment."
