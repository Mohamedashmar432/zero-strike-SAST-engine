id: ZS-JS-001
name: eval() Usage
version: "1.0.0"
language: javascript
category: injection
severity: high
confidence: high
cwe:
  - CWE-95
owasp:
  - "A05:2025"
description: |
  eval() executes arbitrary JavaScript code from a string, flagged when the
  string traces back to an untrusted source (intra-procedural taint tracking).
message: "eval() detected with a tainted argument — avoid eval(); use JSON.parse() or safer alternatives"
references:
  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/eval
tags: [eval, injection, dangerous-function]
match:
  kind: call
  callee: eval
  filters:
    - tainted_argument: true
fix_suggestion: "Replace eval() with a safer alternative such as JSON.parse() for data parsing."
