id: ZS-JS-002
name: innerHTML Assignment (DOM XSS)
version: "1.0.0"
language: javascript
category: xss
severity: high
confidence: medium
cwe:
  - CWE-79
owasp:
  - "A05:2025"
description: |
  Assigning to innerHTML directly inserts HTML into the DOM without sanitization,
  flagged when the assigned value traces back to an untrusted source
  (intra-procedural taint tracking).
message: "innerHTML assignment detected with a tainted value — sanitize input or use textContent / DOM APIs instead"
references:
  - https://owasp.org/www-community/attacks/xss/
tags: [xss, innerHTML, dom-injection]
match:
  kind: assignment
  lhs_identifier: "innerHTML"
  filters:
    - tainted_rhs: true
fix_suggestion: "Use textContent for text, or a sanitization library (DOMPurify) before assigning to innerHTML."
