id: ZS-CS-017
lifecycle: released
name: Open Redirect (Response.Redirect)
version: "1.0.0"
language: csharp
category: open-redirect
severity: medium
confidence: medium
cwe:
  - CWE-601
owasp:
  - "A01:2025"
rationale: |
  Passing an attacker-controlled URL to Response.Redirect() sends the
  victim's browser to whatever destination the attacker chose, while the
  link itself still points at the trusted application's domain — a
  pattern widely used in phishing to lend legitimacy to a malicious
  landing page, and in some OAuth/SSO flows to steal authorization codes
  or tokens by redirecting them to an attacker-controlled callback. This
  is exploitable wherever a query parameter or form field is passed to
  Redirect() without validating it against an allowlist of permitted
  destinations.
description: |
  Response.Redirect() is called with a destination that traces back to an
  untrusted source (intra-procedural taint tracking), without validating
  it against an allowlist of permitted destinations.
message: "Response.Redirect() called with a tainted destination — open redirect risk"
references:
  - https://cwe.mitre.org/data/definitions/601.html
tags: [open-redirect, redirect]
match:
  kind: call
  callee: Response.Redirect
  # callee_suffix: real code almost always reaches Response.Redirect through
  # a receiver — context.Response.Redirect(...), this.Response.Redirect(...),
  # Page.Response.Redirect(...) — not a bare 2-segment call, exactly as
  # ZS-CS-004 handles Response.Write. Suffix matching (dot-boundary only,
  # see internal/engine's calleeSuffixMatches) lets this rule fire on any of
  # those without a separate rule per receiver name.
  callee_suffix: true
  filters:
    - tainted_argument: true
fix_suggestion: "Validate the destination against an allowlist of known-safe paths/domains before passing it to Redirect()."
