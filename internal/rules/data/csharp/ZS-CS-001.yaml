id: ZS-CS-001
lifecycle: released
name: Process.Start Command Injection
version: "1.0.0"
language: csharp
category: injection
severity: high
confidence: high
cwe:
  - CWE-78
owasp:
  - "A05:2025"
rationale: |
  Process.Start() launches an OS process using attacker-influenced data as
  the executable path or argument string, letting an attacker redirect
  execution to an arbitrary binary or smuggle extra arguments into whatever
  program actually runs (cmd.exe, powershell.exe, or a scripting
  interpreter). Unlike Python's os.system() or PHP's system(), which always
  route the string through /bin/sh, .NET's default UseShellExecute=false
  means no shell reinterprets metacharacters — but that only narrows the
  blast radius, since a tainted filename or argument can still hijack which
  program runs or what it is told to do. This is exploitable wherever a
  filename, hostname, or other request-derived value is concatenated into
  the process name or argument list, typically in file-conversion,
  report-generation, or admin-tooling endpoints that shell out to an
  external utility.
description: |
  Process.Start() executes an OS command, flagged when the command string
  traces back to an untrusted source (intra-procedural taint tracking).
message: "Process.Start() detected with a tainted argument — validate/allowlist the command and avoid passing user input to the shell"
references:
  - https://owasp.org/www-community/attacks/Command_Injection
tags: [command-injection, injection, process]
match:
  kind: call
  callee: Process.Start
  filters:
    - tainted_argument: true
fix_suggestion: "Use a fixed executable path with ProcessStartInfo and pass user data only as validated arguments, never as the command itself."
