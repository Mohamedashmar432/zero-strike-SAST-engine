id: ZS-CS-001
name: Process.Start Command Injection
version: "1.0.0"
language: csharp
category: injection
severity: high
confidence: high
cwe:
  - CWE-78
owasp:
  - "A05:2025"
description: |
  Process.Start() executes an OS command, flagged when the command string
  traces back to an untrusted source (intra-procedural taint tracking).
message: "Process.Start() detected with a tainted argument — validate/allowlist the command and avoid passing user input to the shell"
references:
  - https://owasp.org/www-community/attacks/Command_Injection
tags: [command-injection, injection, process]
match:
  kind: call
  callee: Process.Start
  filters:
    - tainted_argument: true
fix_suggestion: "Use a fixed executable path with ProcessStartInfo and pass user data only as validated arguments, never as the command itself."
