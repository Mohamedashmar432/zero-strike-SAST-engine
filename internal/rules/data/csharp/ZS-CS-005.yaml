id: ZS-CS-005
name: Weak Cryptographic Hash (MD5)
version: "1.0.0"
language: csharp
category: cryptography
severity: medium
confidence: high
cwe:
  - CWE-327
owasp:
  - "A04:2025"
rationale: |
  MD5 is cryptographically broken: collisions can be forged in seconds, and
  as a hash for passwords it is fast enough for commodity GPUs to test
  billions of guesses per second, so using MD5.Create() for password
  storage, digital signatures, or file-integrity checks lets an attacker
  forge colliding content or recover plaintext passwords from a leaked hash
  database. This is exploitable anywhere the hash is used as a security
  control rather than a checksum — password tables, signed tokens, or
  integrity checks on downloaded files — and the risk is identical to Go's
  md5.New() (ZS-GO-004): the weakness is in the algorithm, not the API
  surface around it.
description: |
  Detects calls to MD5.Create().
message: "Weak hash algorithm MD5 detected — use SHA-256 or stronger"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
tags: [weak-crypto, md5, hash]
match:
  kind: call
  callee: MD5.Create
fix_suggestion: "Replace MD5.Create() with SHA256.Create(), or use a password KDF (PBKDF2/bcrypt/argon2) for passwords."
