id: ZS-CS-004
lifecycle: released
name: Response.Write XSS Sink
version: "1.0.0"
language: csharp
category: xss
severity: high
confidence: medium
cwe:
  - CWE-79
owasp:
  - "A05:2025"
rationale: |
  Response.Write() sends its argument straight into the HTTP response body,
  so attacker-controlled data containing <script> tags or event handlers is
  parsed and executed by the victim's browser in the application's origin
  the moment the page renders, unless it is HTML-encoded first. This is
  exploitable wherever a query-string value, form field, or other
  request-derived value is echoed back into the response — classic
  reflected XSS in legacy ASP.NET Web Forms or MVC code paths that bypass
  the framework's default output encoding by writing to the response
  stream directly.
description: |
  Response.Write() emits markup directly to the HTTP response, flagged when
  the written value traces back to an untrusted source (intra-procedural
  taint tracking) without encoding.
message: "Response.Write() detected with a tainted value — HTML-encode user input before writing it to the response"
references:
  - https://owasp.org/www-community/attacks/xss/
tags: [xss, response-write]
match:
  kind: call
  callee: Response.Write
  filters:
    - tainted_argument: true
fix_suggestion: "Encode before writing: Response.Write(HttpUtility.HtmlEncode(value)), or use framework encoding helpers."
