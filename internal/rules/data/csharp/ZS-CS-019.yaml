id: ZS-CS-019
lifecycle: released
name: Tainted Format String (string.Format)
version: "1.0.0"
language: csharp
category: format-string
severity: low
confidence: low
cwe:
  - CWE-134
owasp:
  - "A05:2025"
rationale: |
  When the format-string template itself is built from attacker-controlled
  input — e.g. string.Format(userSuppliedTemplate, ...) rather than a fixed
  literal — the attacker can inject their own composite-format
  placeholders ({0}, {1:x}, deeply nested alignment/format specifiers) to
  trigger unexpected output, FormatException-based faults, or
  information disclosure of values never intended to be formatted with
  that call. This is a real, if less common, risk than injection into the
  values being formatted.

  Known limitation, documented deliberately rather than hidden: the
  engine's tainted_argument filter checks whether ANY argument to the call
  is tainted, with no way to require it be specifically the first
  (format-string) argument. As a result this rule ALSO fires on the
  extremely common, entirely safe placeholder idiom
  string.Format("User: {0}", username) — where only the interpolated
  value, not the template, is tainted — not just the real vulnerable shape
  where the template itself is attacker-controlled
  (string.Format("User: " + username)). This rule is intentionally
  imprecise for that reason, matching how ZS-CS-013 already documents its
  own known over-breadth rather than silently narrowing (and thereby
  missing real hits) or pretending the rule is more precise than it is.

  Separately, and independent of the above: this rule only matches the
  lowercase `string.Format` spelling (C#'s `string` keyword alias for
  System.String). Code using the uppercase `String.Format` spelling —
  equally valid C#, identical runtime behavior — will not match, because
  the engine's callee matching is an exact/suffix text match, not
  case-insensitive. This is a real, accepted precision tradeoff (the same
  naming-convention-dependent class as several other rules in this
  ruleset), not something to work around by silently adding a second rule
  here.
description: |
  string.Format() is called with an argument that traces back to an
  untrusted source (intra-procedural taint tracking). This flags any
  tainted argument to the call, not specifically the format-string
  template — see the known-limitation note in the rationale above; most
  matches will be the safe "tainted value substituted into a fixed
  template" case and need manual review to confirm whether the template
  itself is attacker-controlled. Only the lowercase `string.Format`
  spelling is matched; `String.Format` is not (see rationale).
message: "string.Format() called with a tainted argument — verify whether the format template itself (not just an interpolated value) is attacker-controlled"
references:
  - https://cwe.mitre.org/data/definitions/134.html
tags: [format-string, injection]
match:
  kind: call
  callee: string.Format
  filters:
    - tainted_argument: true
fix_suggestion: "Never build the format-string template from untrusted input; use a fixed literal template and pass tainted data only as substitution arguments."
