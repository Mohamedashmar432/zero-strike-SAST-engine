id: ZS-CS-014
lifecycle: released
name: Weak Pseudo-Random Number Generator (System.Random)
version: "1.0.0"
language: csharp
category: cryptography
severity: medium
confidence: medium
cwe:
  - CWE-338
owasp:
  - "A04:2025"
rationale: |
  System.Random is not cryptographically secure: it is a deterministic
  generator, by default seeded from the system clock, with a small enough
  internal state that an attacker who observes a handful of outputs — or
  who can bound the process's start time — can reconstruct the sequence
  and predict every value that follows. Using new Random() to generate a
  password-reset token, session identifier, or one-time code lets that
  attacker guess or reconstruct future values instead of needing to
  brute-force a truly random space. This is exploitable anywhere the
  generated value is meant to be unguessable, unlike its legitimate uses
  (jitter, shuffling a list, test fixtures, non-security sampling) where
  predictability doesn't matter — and since there is no taint signal
  available at a bare constructor call to tell those uses apart, the rule
  matches unconditionally on construction, the same precedent ZS-CS-013
  set for new HttpCookie(), and asks the reader to judge whether the
  value reaches anything security-sensitive, hence medium rather than
  high confidence.
description: |
  Detects instantiation of System.Random via new Random(). Verify the
  generated value is not used for a token, session identifier, password-
  reset code, or other security-sensitive purpose.
message: "new Random() detected — not cryptographically secure, predictable to an attacker"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
  - https://cwe.mitre.org/data/definitions/338.html
tags: [weak-crypto, weak-prng, random]
match:
  kind: call
  callee: Random
fix_suggestion: "Use System.Security.Cryptography.RandomNumberGenerator (e.g. RandomNumberGenerator.GetInt32()/GetBytes()) for tokens, session IDs, and password-reset codes; System.Random is fine only for non-security randomness."
