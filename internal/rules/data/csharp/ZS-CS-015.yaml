id: ZS-CS-015
lifecycle: released
name: Path Traversal via File.ReadAllText
version: "1.0.0"
language: csharp
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
rationale: |
  File.ReadAllText() reads whatever path it is given relative to the
  process's working directory, so attacker-controlled path segments
  containing ../ sequences (or an absolute path, depending on how the
  path is built) let an attacker escape the intended directory and read
  arbitrary files the process's OS-level permissions allow —
  configuration files, other users' data, or source code. This is
  exploitable wherever a filename or path segment from a request (a
  download endpoint, template name, or user-uploaded file reference) is
  joined into the path passed to File.ReadAllText() without first
  resolving and confining it to an allowed base directory. File is a
  static class, so unlike the receiver-qualified sinks elsewhere in this
  ruleset, the dotted callee File.ReadAllText is stable across call
  sites — there is no instance-naming variance to work around.
description: |
  File.ReadAllText() is called with a path that traces back to an
  untrusted source (intra-procedural taint tracking).
message: "File.ReadAllText() called with a tainted path — validate and confine the path before use"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
tags: [path-traversal, file-access]
match:
  kind: call
  callee: File.ReadAllText
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with Path.GetFullPath() and confirm it stays within the allowed base directory before reading it, or reject paths containing '..'."
