id: ZS-CS-003
lifecycle: released
name: BinaryFormatter Insecure Deserialization
version: "1.0.0"
language: csharp
category: deserialization
severity: critical
confidence: high
cwe:
  - CWE-502
owasp:
  - "A08:2025"
rationale: |
  BinaryFormatter reconstructs arbitrary .NET types from the byte stream by
  design, including types with side-effecting constructors, property
  setters, or ISerializable/IDeserializationCallback hooks, so an attacker
  who controls the serialized payload can chain these into remote code
  execution the moment Deserialize() runs — no separate injection point is
  needed beyond feeding in the bytes. This is exploitable anywhere a
  BinaryFormatter payload crosses a trust boundary: view state, cached
  objects, inter-service messages, or uploads an attacker can influence,
  which is why Microsoft now treats any use of the type as unsafe rather
  than trying to sandbox specific call patterns.
description: |
  BinaryFormatter is deprecated by Microsoft; this rule flags the
  instantiation itself (new BinaryFormatter()), matching Microsoft's
  guidance that the type should not be used at all, regardless of the
  receiver variable it is later called through.
message: "BinaryFormatter usage detected — insecure deserialization enables RCE; use System.Text.Json or another safe serializer"
references:
  - https://learn.microsoft.com/en-us/dotnet/standard/serialization/binaryformatter-security-guide
tags: [deserialization, rce, binaryformatter]
match:
  kind: call
  callee: BinaryFormatter
fix_suggestion: "Replace BinaryFormatter with System.Text.Json (JsonSerializer) or DataContractSerializer with a known-type allowlist."
