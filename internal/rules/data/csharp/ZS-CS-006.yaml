id: ZS-CS-006
lifecycle: released
name: Hardcoded Credential
version: "1.0.0"
language: csharp
category: authentication
severity: high
confidence: medium
cwe:
  - CWE-798
owasp:
  - "A07:2025"
rationale: |
  A credential embedded as a string literal in source ships inside the
  compiled assembly, and .NET binaries decompile back to near-original,
  readable source with tools like ILSpy or dotPeek, so an attacker who
  obtains only the shipped DLL/EXE — with no repository or CI access at all
  — can recover the literal along with the surrounding logic that uses it.
  Once extracted, the attacker gains standing access to whatever the
  credential protects (a database, an internal API, a third-party service)
  that persists until the secret is rotated, independent of any other
  vulnerability in the running application.
description: |
  A variable named like a credential (password, secret, api key, token) is
  assigned a string literal directly in source code, rather than loaded from
  configuration, an environment variable, or a secrets manager.
message: "Hardcoded credential detected — load secrets from configuration or a secrets manager"
references:
  - https://cwe.mitre.org/data/definitions/798.html
tags: [hardcoded-credential, authentication]
match:
  kind: assignment
  lhs_identifier: "(?i)(password|secret|api[_-]?key|apikey|token)"
  rhs_literal: "^@?[\"].+[\"]$"
fix_suggestion: "Replace the literal with Environment.GetEnvironmentVariable, IConfiguration, or a secrets manager lookup."
