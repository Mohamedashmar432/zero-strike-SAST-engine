id: ZS-TS-004
name: TLS Certificate Verification Disabled (rejectUnauthorized)
version: "1.0.0"
language: typescript
category: security-misconfiguration
severity: high
confidence: high
cwe:
  - CWE-295
owasp:
  - "A02:2025"
rationale: |
  Setting rejectUnauthorized: false disables Node's TLS certificate chain
  and hostname validation for the connection — this is a runtime HTTPS
  option that TypeScript's type system permits without warning, so the
  application will accept a certificate from any party, including an
  attacker performing a man-in-the-middle attack. This is exploitable on
  any network path the attacker can intercept (public Wi-Fi, compromised
  routers, malicious proxies), letting them read or tamper with credentials
  and session tokens sent over the connection.
description: |
  Detects calls to https.request() where the options object sets
  rejectUnauthorized: false, disabling TLS certificate validation for the
  connection.
message: "rejectUnauthorized: false detected — TLS certificate verification is disabled"
references:
  - https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/
tags: [misconfiguration, tls]
match:
  kind: call
  callee: https.request
  filters:
    - kwarg:
        name: rejectUnauthorized
        value_pattern: "^false$"
fix_suggestion: "Remove rejectUnauthorized: false. If a custom CA is required, pass it via the ca option instead."
