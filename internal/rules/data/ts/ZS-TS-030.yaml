id: ZS-TS-030
lifecycle: released
name: Path Traversal via res.sendFile
version: "1.0.0"
language: typescript
category: path-traversal
severity: high
confidence: medium
cwe:
  - CWE-22
owasp:
  - "A01:2025"
rationale: |
  Express's res.sendFile() with an attacker-influenced path lets an
  attacker embed ../ sequences (or supply an absolute path) to escape the
  intended directory and have the server stream back arbitrary files it can
  read — configuration files containing secrets, other users' data, or
  application source code — directly to the requester as an HTTP response.
  TypeScript's `string` type for the path argument gives no guarantee about
  its contents, so this is exploitable wherever a filename or path segment
  from a request (a download endpoint, template name, or user-uploaded file
  reference) reaches res.sendFile() without first being resolved and
  confined to an allowed base directory.

  This relies on the conventional Express response parameter being named
  res, the same naming-convention tradeoff ZS-TS-019 (res.redirect) already
  documents: a handler that names its response parameter something else
  won't match.

  TypeScript is a fully separate language in this engine and inherits
  nothing from ZS-JS-032, so this gap is total, not partial — ported
  verbatim from ZS-JS-032, same match shape.
description: |
  Detects calls to res.sendFile() where the path argument traces back to
  an untrusted source (intra-procedural taint tracking, including a source
  expression used directly inline as the argument, not only via a
  previously-assigned named variable).
message: "res.sendFile() called with a tainted path — path traversal risk"
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
  - https://expressjs.com/en/api.html#res.sendFile
tags: [path-traversal, file-access, express]
match:
  kind: call
  callee: res.sendFile
  filters:
    - tainted_argument: true
fix_suggestion: "Resolve the path with path.resolve/path.normalize and confirm it stays within the allowed base directory (or pass the { root } option) before calling sendFile()."
