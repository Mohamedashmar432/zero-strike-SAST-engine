id: ZS-TS-003
name: document.write() Usage (DOM XSS)
version: "1.0.0"
language: typescript
category: xss
severity: high
confidence: medium
cwe:
  - CWE-79
owasp:
  - "A05:2025"
description: |
  document.write() writes directly to the HTML document stream without sanitization,
  flagged when the argument traces back to an untrusted source (intra-procedural
  taint tracking).
message: "document.write() detected with a tainted argument — use safe DOM manipulation APIs instead"
references:
  - https://developer.mozilla.org/en-US/docs/Web/API/Document/write
tags: [xss, document-write, dom-injection]
match:
  kind: call
  callee: document.write
  filters:
    - tainted_argument: true
fix_suggestion: "Replace document.write() with safe DOM APIs such as createElement and appendChild."
