id: ZS-PY-001
lifecycle: released
name: Dangerous eval() Usage
version: "1.0.0"
language: python
category: dangerous-functions
severity: high
confidence: high
cwe:
  - CWE-95
owasp:
  - "A05:2025"
rationale: |
  eval() compiles and executes its argument as arbitrary Python source, so any
  attacker-controlled data reaching it grants full code execution in the
  process — reading secrets, writing files, or spawning further commands. This
  is exploitable wherever user input (form fields, query parameters,
  deserialized data) flows into an eval() call, whether directly or after
  string concatenation.
description: |
  Detects calls to the eval() builtin. The rule does not perform taint
  tracking, so every eval() call is reported regardless of whether its
  argument originates from user input.
message: "Dangerous call to eval() — replace with ast.literal_eval() for safe parsing"
references:
  - https://owasp.org/Top10/2025/A05_2025-Injection/
tags: [rce, injection, eval]
match:
  kind: call
  callee: eval
fix_suggestion: "Use ast.literal_eval() instead of eval() when parsing user data."
