id: ZS-PY-018
lifecycle: released
name: TLS Certificate Verification Disabled (requests.get)
version: "1.0.0"
language: python
category: security-misconfiguration
severity: high
confidence: high
cwe:
  - CWE-295
owasp:
  - "A02:2025"
rationale: |
  Disabling TLS certificate verification means the client accepts any
  certificate — expired, self-signed, or issued for a different host — so an
  attacker positioned on the network path (public Wi-Fi, a compromised proxy,
  DNS spoofing) can present their own certificate and transparently intercept
  or modify the traffic. This is exploitable for any request made with
  verify=False, especially ones carrying credentials, tokens, or sensitive
  payloads.
description: |
  Calling requests.get() with verify=False disables TLS certificate validation.
  Note: only requests.get() is covered by this rule — requests.post/put/delete
  with the same flag are not yet detected; add sibling rules if these show up
  in practice (the engine currently requires one rule per exact callee).
message: "requests.get(verify=False) detected — TLS certificate verification is disabled"
references:
  - https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/
tags: [misconfiguration, tls, requests]
match:
  kind: call
  callee: requests.get
  filters:
    - kwarg:
        name: verify
        value_pattern: "^False$"
fix_suggestion: "Remove verify=False. If a custom CA is required, pass verify='/path/to/ca-bundle.pem' instead."
