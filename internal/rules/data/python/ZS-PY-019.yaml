id: ZS-PY-019
name: Django ALLOWED_HOSTS Assignment
version: "1.0.0"
language: python
category: security-misconfiguration
severity: medium
confidence: low
cwe:
  - CWE-16
owasp:
  - "A02:2025"
description: |
  Flags any assignment to Django's ALLOWED_HOSTS setting for manual review.
  A wildcard value (e.g. ['*']) disables Django's Host header validation, but
  this rule cannot yet distinguish a wildcard from a safe explicit host list —
  every assignment is flagged; confirm no wildcard is present.
message: "ALLOWED_HOSTS assignment detected — confirm it does not contain a wildcard ('*')"
references:
  - https://owasp.org/Top10/2025/A02_2025-Security_Misconfiguration/
tags: [misconfiguration, django, allowed-hosts]
match:
  kind: assignment
  lhs_identifier: "^ALLOWED_HOSTS$"
fix_suggestion: "List explicit hostnames in ALLOWED_HOSTS; never use '*' in production."
