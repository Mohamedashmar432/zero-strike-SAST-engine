id: ZS-PY-012
name: subprocess.call() Usage
version: "1.0.0"
language: python
category: injection
severity: high
confidence: medium
cwe:
  - CWE-78
owasp:
  - "A03:2021"
description: |
  subprocess.call() executes external commands and may be vulnerable to command
  injection if arguments include user-controlled data. Prefer subprocess.run()
  with a list argument and shell=False.
message: "subprocess.call() detected — ensure arguments are not user-controlled; use shell=False"
references:
  - https://docs.python.org/3/library/subprocess.html
tags: [command-injection, subprocess]
match:
  kind: call
  callee: subprocess.call
fix_suggestion: "Use subprocess.run([cmd, arg1, arg2], shell=False) with a list to prevent shell injection."
