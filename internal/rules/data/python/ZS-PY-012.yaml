id: ZS-PY-012
name: subprocess.call() Usage
version: "1.0.0"
language: python
category: injection
severity: high
confidence: medium
cwe:
  - CWE-78
owasp:
  - "A05:2025"
rationale: |
  subprocess.call() passes its argument list (or string) to the operating
  system to execute as a new process; when that command or its arguments are
  built from tainted, user-influenced data, an attacker can inject additional
  arguments or, if a shell is invoked, additional commands. This is
  exploitable wherever request data, filenames, or configuration values feed
  into the command being executed.
description: |
  subprocess.call() executes external commands and is flagged when the command
  argument traces back to an untrusted source (intra-procedural taint tracking).
  Prefer subprocess.run() with a list argument and shell=False.
message: "subprocess.call() detected with a tainted argument — ensure it is not user-controlled; use shell=False"
references:
  - https://docs.python.org/3/library/subprocess.html
tags: [command-injection, subprocess]
match:
  kind: call
  callee: subprocess.call
  filters:
    - tainted_argument: true
fix_suggestion: "Use subprocess.run([cmd, arg1, arg2], shell=False) with a list to prevent shell injection."
