id: ZS-PY-015
name: urllib.request.urlopen() SSRF Entry Point
version: "1.0.0"
language: python
category: ssrf
severity: medium
confidence: medium
cwe:
  - CWE-918
owasp:
  - "A01:2025"
rationale: |
  If the URL passed to urlopen() is influenced by user input, an attacker can
  redirect the request to internal-only services, loopback addresses, or cloud
  metadata endpoints (e.g. 169.254.169.254) that are normally unreachable from
  outside the network, potentially exposing internal APIs, credentials, or
  instance metadata. This is exploitable in any feature that fetches a
  user-supplied URL, such as webhook registration, link previews, or
  file-import-by-URL.
description: |
  Detects calls to urllib.request.urlopen(), which fetches whatever URL it is
  given without validation.
message: "urllib.request.urlopen() detected — validate and allowlist URLs before use"
references:
  - https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/
tags: [ssrf, urllib, request-forgery]
match:
  kind: call
  callee: urllib.request.urlopen
fix_suggestion: "Validate the URL against an allowlist. Reject internal/private IPs and non-http(s) schemes."
