id: ZS-PY-015
name: urllib.request.urlopen() SSRF Entry Point
version: "1.0.0"
language: python
category: ssrf
severity: medium
confidence: medium
cwe:
  - CWE-918
owasp:
  - "A01:2025"
description: |
  urllib.request.urlopen() fetches a URL that may be user-controlled, creating a
  Server-Side Request Forgery (SSRF) risk. Attackers can use SSRF to reach internal
  services, cloud metadata endpoints, or bypass network controls.
message: "urllib.request.urlopen() detected — validate and allowlist URLs before use"
references:
  - https://owasp.org/Top10/2025/A01_2025-Broken_Access_Control/
tags: [ssrf, urllib, request-forgery]
match:
  kind: call
  callee: urllib.request.urlopen
fix_suggestion: "Validate the URL against an allowlist. Reject internal/private IPs and non-http(s) schemes."
