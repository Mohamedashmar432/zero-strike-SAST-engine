id: ZS-PY-010
name: yaml.load Without safe_load
version: "1.0.0"
language: python
category: deserialization
severity: high
confidence: high
cwe:
  - CWE-502
owasp:
  - "A08:2025"
rationale: |
  yaml.load() with the default (or any non-safe) Loader can construct
  arbitrary Python objects via custom tags such as !!python/object/apply,
  which lets an attacker who controls the YAML document execute arbitrary
  code or instantiate dangerous objects during deserialization. This is
  exploitable anywhere the application parses YAML from an untrusted source —
  config uploads, API payloads, or user-editable settings files.
description: |
  Detects calls to yaml.load(), regardless of whether a Loader argument is
  supplied.
message: "yaml.load() is unsafe — use yaml.safe_load() or add Loader=yaml.SafeLoader"
references:
  - https://pyyaml.org/wiki/PyYAMLDocumentation#loading-yaml
tags: [deserialization, yaml, unsafe-load]
match:
  kind: call
  callee: yaml.load
fix_suggestion: "Replace yaml.load(stream) with yaml.safe_load(stream)."
