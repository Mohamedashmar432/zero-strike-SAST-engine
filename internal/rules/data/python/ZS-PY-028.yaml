id: ZS-PY-028
lifecycle: released
name: Open Redirect (Flask redirect)
version: "1.0.0"
language: python
category: open-redirect
severity: medium
confidence: medium
cwe:
  - CWE-601
owasp:
  - "A01:2025"
rationale: |
  Passing an attacker-controlled URL to Flask's redirect() sends the
  victim's browser to whatever destination the attacker chose, while the
  link itself still points at the trusted application's domain — a pattern
  widely used in phishing to lend legitimacy to a malicious landing page,
  and in some OAuth/SSO flows to steal authorization codes or tokens by
  redirecting them to an attacker-controlled callback. This is exploitable
  wherever a query parameter or form field is passed to redirect() without
  validating it against an allowlist of permitted destinations.
description: |
  Detects calls to redirect() (Flask's `from flask import redirect`) where
  the destination traces back to an untrusted source (intra-procedural
  taint tracking).
message: "redirect() called with a tainted destination — open redirect risk"
references:
  - https://cwe.mitre.org/data/definitions/601.html
tags: [open-redirect, injection, flask]
match:
  kind: call
  callee: redirect
  filters:
    - tainted_argument: true
fix_suggestion: "Validate the destination against an allowlist of known-safe paths/domains before passing it to redirect()."
