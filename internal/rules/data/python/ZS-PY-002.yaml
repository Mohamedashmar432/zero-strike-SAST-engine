id: ZS-PY-002
name: Insecure pickle.loads Deserialization
version: "1.0.0"
language: python
category: deserialization
severity: critical
confidence: high
cwe:
  - CWE-502
owasp:
  - "A08:2025"
rationale: |
  Python's pickle format can embed a call to any importable callable via the
  object's __reduce__ protocol, so pickle.loads() on attacker-controlled bytes
  hands the attacker arbitrary code execution during deserialization, not just
  a data-structure rebuild. This is commonly exploitable in caching layers,
  session cookies, and inter-service message queues — anywhere a serialized
  object crosses a trust boundary.
description: |
  Detects calls to pickle.loads(). The rule does not trace the byte source
  back to a taint origin, so every call is reported regardless of whether the
  input is verified as trusted.
message: "Insecure deserialization via pickle.loads() — use a safe format like JSON"
references:
  - https://docs.python.org/3/library/pickle.html#pickle-inst
tags: [deserialization, rce, pickle]
match:
  kind: call
  callee: pickle.loads
fix_suggestion: "Replace pickle with json or a safe serialization library."
