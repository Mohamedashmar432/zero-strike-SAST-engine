id: ZS-PY-011
lifecycle: released
name: Weak Cryptographic Hash (SHA1)
version: "1.0.0"
language: python
category: cryptography
severity: medium
confidence: high
cwe:
  - CWE-327
owasp:
  - "A04:2025"
rationale: |
  SHA1 has known practical collision attacks (e.g. SHAttered) and, like MD5, is
  fast enough for attackers to brute-force at scale on commodity GPUs. Using it
  for password hashing, digital signatures, or certificate/file integrity
  checks lets an attacker forge colliding content or recover passwords from a
  leaked hash, undermining the integrity guarantee the hash was meant to
  provide.
description: |
  Detects calls to hashlib.sha1().
message: "Weak hash algorithm SHA1 detected — use SHA-256 or stronger"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
tags: [weak-crypto, sha1, hash]
match:
  kind: call
  callee: hashlib.sha1
fix_suggestion: "Replace hashlib.sha1() with hashlib.sha256() or use bcrypt/argon2 for passwords."
