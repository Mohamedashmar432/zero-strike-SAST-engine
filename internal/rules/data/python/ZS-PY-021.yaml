id: ZS-PY-021
lifecycle: released
name: JWT Signature Verification Disabled
version: "1.0.0"
language: python
category: authentication
severity: critical
confidence: high
cwe:
  - CWE-347
owasp:
  - "A07:2025"
rationale: |
  Without signature verification, jwt.decode() will accept any token whose
  payload is well-formed JSON, regardless of who created it — an attacker can
  hand-craft a token claiming any user identity, role, or permission and have
  the application trust it outright. This is exploitable wherever JWTs
  authenticate or authorize requests, letting an attacker impersonate any
  user or escalate to admin.
description: |
  Detects calls to jwt.decode() with verify=False.
message: "jwt.decode(verify=False) detected — signature verification is disabled"
references:
  - https://cwe.mitre.org/data/definitions/347.html
tags: [jwt, authentication, signature-bypass]
match:
  kind: call
  callee: jwt.decode
  filters:
    - kwarg:
        name: verify
        value_pattern: "^False$"
fix_suggestion: "Remove verify=False and always validate the JWT signature with the correct algorithm and key."
