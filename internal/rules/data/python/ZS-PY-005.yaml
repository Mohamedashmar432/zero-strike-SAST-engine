id: ZS-PY-005
lifecycle: released
name: os.system() Command Injection
version: "1.0.0"
language: python
category: command-injection
severity: high
confidence: high
cwe:
  - CWE-78
owasp:
  - "A05:2025"
rationale: |
  os.system() unconditionally invokes a shell to run its argument, so any
  user-controlled data included in that string can be used to inject shell
  metacharacters and execute arbitrary additional commands with the
  privileges of the running process. This is exploitable wherever the command
  string is built from request parameters, filenames, or other external input.
description: |
  Detects direct calls to os.system(), which always executes its argument
  through the system shell.
message: "os.system() is vulnerable to command injection — use subprocess with a list of args"
references:
  - https://docs.python.org/3/library/os.html#os.system
tags: [command-injection, os-system]
match:
  kind: call
  callee: os.system
fix_suggestion: "Replace os.system() with subprocess.run([...], check=True)."
