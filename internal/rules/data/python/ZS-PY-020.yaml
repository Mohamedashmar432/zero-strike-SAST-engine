id: ZS-PY-020
lifecycle: released
name: Hardcoded Credential
version: "1.0.0"
language: python
category: authentication
severity: high
confidence: medium
cwe:
  - CWE-798
owasp:
  - "A07:2025"
rationale: |
  A credential embedded directly in source code is checked into version
  control, copied into every build artifact, and visible to anyone with read
  access to the repository or a decompiled/leaked build, including former
  employees and future contributors. Once committed, rotating the secret
  requires purging repository history, and any prior clone or CI log that
  captured it remains a standing compromise.
description: |
  A variable named like a credential (password, secret, api_key, token) is
  assigned a string literal directly in source code, rather than loaded from
  an environment variable or secrets manager.
message: "Hardcoded credential detected — load secrets from environment variables or a secrets manager"
references:
  - https://cwe.mitre.org/data/definitions/798.html
tags: [hardcoded-credential, authentication]
match:
  kind: assignment
  lhs_identifier: "(?i)(password|secret|api_key|token)"
  rhs_literal: "^[\"'].+[\"']$"
fix_suggestion: "Replace the literal with os.environ['...'] or a secrets manager lookup."
