id: ZS-PY-013
name: os.popen() Command Execution
version: "1.0.0"
language: python
category: injection
severity: high
confidence: medium
cwe:
  - CWE-78
owasp:
  - "A05:2025"
rationale: |
  os.popen() always executes its argument through the system shell, so a
  tainted command string lets an attacker inject shell metacharacters to run
  arbitrary additional commands and read their output through the returned
  pipe. This is exploitable wherever the piped command is assembled from
  user-supplied filenames, search terms, or other request data.
description: |
  os.popen() opens a pipe to a shell command and is flagged when the command
  string traces back to an untrusted source (intra-procedural taint tracking).
  Use the subprocess module instead.
message: "os.popen() detected with a tainted argument — replace with subprocess.run() to avoid shell injection"
references:
  - https://docs.python.org/3/library/os.html#os.popen
tags: [command-injection, os-popen]
match:
  kind: call
  callee: os.popen
  filters:
    - tainted_argument: true
fix_suggestion: "Replace os.popen() with subprocess.run([cmd], capture_output=True) to avoid shell expansion."
