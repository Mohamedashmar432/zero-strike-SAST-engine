id: ZS-PY-023
lifecycle: released
name: Bare except Clause
version: "1.0.0"
language: python
category: error-handling
severity: medium
confidence: high
cwe:
  - CWE-396
owasp:
  - "A10:2025"
rationale: |
  A bare except swallows every exception indiscriminately, including ones
  raised by security controls — a failed permission check, a cryptographic
  verification error, a broken invariant — so the code can silently continue
  down a path that assumed the operation succeeded. This is dangerous
  anywhere a try block wraps an authentication, authorization, or
  input-validation step, since the resulting failure mode is invisible: no
  log entry, no alert, just execution continuing as if nothing went wrong.
description: |
  A bare "except:" clause catches every exception, including SystemExit and
  KeyboardInterrupt. Fires once per try block containing at least one
  bare except clause (not once per clause).
message: "Bare except: clause detected — catch specific exception types instead"
references:
  - https://cwe.mitre.org/data/definitions/396.html
tags: [exception-handling, bare-except]
match:
  kind: try
  filters:
    - has_bare_except: true
fix_suggestion: "Catch a specific exception type, e.g. except ValueError:, instead of a bare except:."
