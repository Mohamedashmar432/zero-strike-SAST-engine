id: ZS-PY-029
lifecycle: released
name: Weak Cryptographic Cipher (DES)
version: "1.0.0"
language: python
category: cryptography
severity: medium
confidence: high
cwe:
  - CWE-327
owasp:
  - "A04:2025"
rationale: |
  DES uses a 56-bit key, small enough to brute-force with commodity
  hardware in hours, so data encrypted with pycryptodome's DES.new() offers
  no meaningful confidentiality against a motivated attacker. This is
  exploitable anywhere DES-encrypted data crosses a trust boundary an
  attacker can capture — network traffic, stored files, backups — since
  recovering the key (and therefore the plaintext) no longer requires
  breaking the mathematics, only enough compute time. Sibling rule to
  ZS-GO-008 (Go's crypto/des): same weak algorithm, same rationale, a
  different language's standard crypto library.
description: |
  Detects calls to DES.new() (Crypto.Cipher.DES, from PyCryptodome).
message: "Weak cipher DES detected — use AES-GCM or another modern authenticated cipher"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
tags: [weak-crypto, des, cipher]
match:
  kind: call
  callee: DES.new
fix_suggestion: "Replace DES.new() with Crypto.Cipher.AES in GCM mode for authenticated encryption."
