id: ZS-PY-007
lifecycle: released
name: Weak Cryptographic Hash (MD5/SHA1)
version: "1.0.0"
language: python
category: cryptography
severity: medium
confidence: high
cwe:
  - CWE-327
owasp:
  - "A04:2025"
rationale: |
  MD5 is cryptographically broken: collisions can be generated in seconds, and
  as a password hash it is fast enough for commodity GPUs to brute-force
  billions of guesses per second. Using it for password storage, digital
  signatures, or file-integrity checks lets an attacker forge colliding
  content or recover plaintext passwords from a leaked hash database.
description: |
  Detects calls to hashlib.md5().
message: "Weak hash algorithm detected — use SHA-256 or stronger"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
tags: [weak-crypto, md5, sha1, hash]
match:
  kind: call
  callee: hashlib.md5
fix_suggestion: "Replace hashlib.md5() with hashlib.sha256() or use bcrypt/argon2 for passwords."
