version: "1"
# Fixture files live under testdata/, not cases/, so `go build ./...` /
# `go vet ./...` skip them (Go tooling ignores any "testdata" path segment) —
# otherwise these .go fixtures would be compiled as real packages and
# collide (multiple "package main"/"func main").
cases:
