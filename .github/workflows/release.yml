name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install aarch64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - name: Build linux/amd64
        run: |
          goreleaser build --id linux_amd64 --clean
          mv dist/*/zerostrike "${{ runner.temp }}/zerostrike_linux_amd64"
      - name: Build linux/arm64
        run: |
          goreleaser build --id linux_arm64 --clean
          mv dist/*/zerostrike "${{ runner.temp }}/zerostrike_linux_arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: ${{ runner.temp }}/zerostrike_linux_*

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # No MinGW setup step needed: windows-latest already ships a 64-bit
      # MinGW-w64 gcc at C:\mingw64\bin, added to PATH by default (see
      # actions/runner-images' Install-Mingw64.ps1 and the "gcc" entry in
      # the runner's software manifest) — cgo picks it up with no CC
      # override. Previously this used egor-tensin/setup-mingw@v2 to
      # Chocolatey-install a second MinGW, which hit a real upstream bug
      # (its cleanup step removes a libpthread.dll.a that doesn't exist in
      # newer mingw packages — chocolatey-mingw is on 16.1.0 now; see
      # egor-tensin/setup-mingw#15/#17) and failed every release run.
      # Using the runner's preinstalled toolchain sidesteps that bug
      # entirely instead of pinning around it.
      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - name: Build windows/amd64
        run: |
          goreleaser build --id windows_amd64 --clean
          mv dist/*/zerostrike.exe zerostrike_windows_amd64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: zerostrike_windows_*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - name: Build darwin/amd64
        run: |
          goreleaser build --id darwin_amd64 --clean
          mv dist/*/zerostrike "${{ runner.temp }}/zerostrike_darwin_amd64"
      - name: Build darwin/arm64
        run: |
          goreleaser build --id darwin_arm64 --clean
          mv dist/*/zerostrike "${{ runner.temp }}/zerostrike_darwin_arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-darwin
          path: ${{ runner.temp }}/zerostrike_darwin_*

  # ponytail: goreleaser's own release/publish pipe can't merge partial builds
  # from separate native OS runners in the OSS tier (that's a Pro-only "split
  # and merge" feature) - so this job checksums + uploads via `gh release`
  # directly instead. Upgrade path: goreleaser Pro's `continue --merge`.
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true
      - name: Checksum and publish release
        working-directory: dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha256sum zerostrike_* > checksums.txt
          gh release create "${{ github.ref_name }}" zerostrike_* checksums.txt \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" --generate-notes

      # Portal's /api/v1/downloads/zerostrike/latest/{os-arch} (what the portal's own
      # onboarding UI tells users to curl in their CI) only ever serves binaries a prior
      # admin call POSTed to /api/v1/admin/downloads/zerostrike — this repo's release
      # never did that, so every "latest" download 404s until someone publishes manually.
      # Closes that gap: log in as the portal's CI service account and publish all five.
      - name: Publish binaries to the ZeroStrike portal
        working-directory: dist
        env:
          PORTAL_URL: https://zero-strike-production.up.railway.app
          PORTAL_ADMIN_EMAIL: ${{ secrets.ZS_PORTAL_ADMIN_EMAIL }}
          PORTAL_ADMIN_PASSWORD: ${{ secrets.ZS_PORTAL_ADMIN_PASSWORD }}
        run: |
          token=$(curl -fsSL -X POST "$PORTAL_URL/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$PORTAL_ADMIN_EMAIL\",\"password\":\"$PORTAL_ADMIN_PASSWORD\"}" \
            | jq -r '.access_token')

          publish() {
            echo "Publishing $1 as $2/$3..."
            curl -fsSL -X POST "$PORTAL_URL/api/v1/admin/downloads/zerostrike" \
              -H "Authorization: Bearer $token" \
              -F "version=${{ github.ref_name }}" -F "os=$2" -F "arch=$3" -F "file=@$1"
            echo
          }

          publish zerostrike_linux_amd64 linux amd64
          publish zerostrike_linux_arm64 linux arm64
          publish zerostrike_windows_amd64.exe windows amd64
          publish zerostrike_darwin_amd64 darwin amd64
          publish zerostrike_darwin_arm64 darwin arm64
